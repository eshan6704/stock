<!DOCTYPE html>
<html>
<head>
    <title>Stock / Index App</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            background: #222;
            padding: 6px 10px;
            color: white;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-bar button, .top-bar select, .top-bar input {
            height: 32px;
            padding: 6px 10px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
        }

        .active { background:#00aaff; color:white; }

        #backendDiv, #frontendDiv {
            padding: 15px;
            background: #fff;
            margin: 10px;
            border-radius: 6px;
            box-shadow: 0 0 6px rgba(0,0,0,0.1);
            max-height: 450px;
            overflow-y: auto;
        }

        table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        table, th, td { border: 1px solid #aaa; }
        th { background: #00aaff; color: white; padding: 6px; }
        td { padding: 6px; }
    </style>
</head>

<body>

    <div class="top-bar">
        <button id="btnStock" class="active" onclick="setMode('stock')">Stock</button>
        <button id="btnIndex" onclick="setMode('index')">Index</button>

        <input id="symbolInput" type="text" value="ITC" style="width:120px;">

        <select id="reqType"></select>

        <!-- DATE FIELD -->
        <input id="dateInput" type="date" style="width:150px;">

        <button id="fetchBtn" onclick="fetchNow()" style="background:#2196f3;color:white;">Fetch</button>
    </div>

    <div id="backendDiv"><h3>Backend Output</h3></div>
    <div id="frontendDiv"><h3>Frontend Extracted Tables</h3><p>No tables yet.</p></div>


<script type="module">
    import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    let appInstance = null;
    let currentMode = "stock";

    // Dropdown data
    const reqOptions = {
        stock: ["info","intraday","daily","nse_eq","qresult","result","balance","cashflow","dividend","split"],
        index: ["indices","nse_open","nse_preopen","ce","pe","future","bhav","highlow"]
    };

    // Set default date = yesterday
    function setDefaultDate() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        document.getElementById("dateInput").value = d.toISOString().split("T")[0];
    }
    setDefaultDate();

    // Connect backend
    async function connectBackend() {
        if (!appInstance) {
            appInstance = await Client.connect("eshan6704/backend");
        }
        return appInstance;
    }

    // Backend fetch function
    async function fetchFromBackend(mode, req_type, name, date) {
        try {
            const app = await connectBackend();
            const result = await app.predict("/fetch_data", [
                mode, req_type, name, date
            ]);

            if (Array.isArray(result.data)) return result.data;
            if (typeof result.data === "string") return [result.data];

            return ["<p>No data returned.</p>"];
        } catch (err) {
            return [`<p style='color:red;'>Backend error: ${err.message}</p>`];
        }
    }

    // Main fetch
    window.fetchNow = async function () {
        const name = document.getElementById("symbolInput").value;
        const req_type = document.getElementById("reqType").value;
        const date = document.getElementById("dateInput").value;

        const backendDiv = document.getElementById("backendDiv");
        const frontendDiv = document.getElementById("frontendDiv");

        backendDiv.innerHTML = `<h3>Backend Output</h3>
        <pre>
mode: ${currentMode}
req_type: ${req_type}
symbol: ${name}
date: ${date}
        </pre>
        <p>Loading...</p>`;

        frontendDiv.innerHTML = "<h3>Frontend Extracted Tables</h3>";

        const blocks = await fetchFromBackend(currentMode, req_type, name, date);

        const frag1 = document.createDocumentFragment();
        const frag2 = document.createDocumentFragment();

        blocks.forEach(block => {
            const div = document.createElement("div");
            div.innerHTML = block;
            frag1.appendChild(div);
            frag1.appendChild(document.createElement("hr"));

            const temp = document.createElement("div");
            temp.innerHTML = block;
            temp.querySelectorAll("table").forEach(tbl => {
                frag2.appendChild(tbl.cloneNode(true));
                frag2.appendChild(document.createElement("hr"));
            });
        });

        backendDiv.appendChild(frag1);

        if (frag2.children.length === 0) {
            frontendDiv.innerHTML += "<p>No tables found.</p>";
        } else {
            frontendDiv.appendChild(frag2);
        }
    };

    // Switch stock/index mode
    window.setMode = function (mode) {
        currentMode = mode;
        document.getElementById("symbolInput").value = (mode === "stock") ? "ITC" : "NIFTY 50";

        document.getElementById("reqType").innerHTML =
            reqOptions[mode].map(x => `<option>${x}</option>`).join("");

        document.getElementById("btnStock").classList.toggle("active", mode === "stock");
        document.getElementById("btnIndex").classList.toggle("active", mode === "index");
    };

    // Enter key
    document.getElementById("symbolInput").addEventListener("keypress", e => {
        if (e.key === "Enter") fetchNow();
    });

    // Initialize
    setMode("stock");

</script>

</body>
</html>
