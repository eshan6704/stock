<!DOCTYPE html>
<html>
<head>
    <title>Stock / Index App</title>
    <style>
        body { margin: 0; font-family: Arial; }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            background: #222;
            padding: 8px;
            color: white;
            gap: 10px;
        }

        button, select, input {
            height: 28px;
            padding: 2px 6px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        button.active {
            background: #00aaff;
            color: white;
        }

        button:not(.active) {
            background: #555;
            color: white;
        }

        select, input {
            font-weight: normal;
        }

        /* Backend / Frontend Divs */
        #backendDiv, #frontendDiv {
            padding: 15px;
            border-top: 2px solid #ccc;
        }

        #backendDiv { background: #f8f8f8; display: none; }
        #frontendDiv { background: #eef7ff; display: block; }

        /* Workspace area */
        #workspaceArea {
            padding: 20px;
            min-height: 400px;
            border-top: 2px solid #ddd;
            background: #fff;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">

        <!-- Stock / Index tabs -->
        <button id="btnStock" class="active" onclick="setMode('stock')">Stock</button>
        <button id="btnIndex" onclick="setMode('index')">Index</button>

        <!-- Symbol input -->
        <input type="text" id="symbolInput" value="ITC" style="width:90px;">

        <!-- Request type dropdown -->
        <select id="reqType">
            <option>stock_info</option>
            <option>intraday</option>
            <option>daily</option>
            <option>qresult</option>
            <option>result</option>
            <option>balance</option>
            <option>cashflow</option>
            <option>dividend</option>
            <option>split</option>
        </select>

        <!-- Fetch -->
        <button onclick="fetchNow()">Fetch</button>

        <!-- Backend / Frontend tabs -->
        <button id="btnBackend" class="active" onclick="setDataView('backend')">Backend</button>
        <button id="btnFrontend" onclick="setDataView('frontend')">Frontend</button>

    </div>

    <!-- BACKEND DIV -->
    <div id="backendDiv">
        <h3>Backend Data</h3>
    </div>

    <!-- FRONTEND DIV -->
    <div id="frontendDiv">
        <h3>Frontend Extracted Data</h3>
    </div>

    <!-- Workspace area -->
    <div id="workspaceArea">
        <!-- Reserved for charts, tables, or other content -->
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let appInstance = null;
        let currentView = 'backend'; // default active data view

        // Connect to backend
        async function connectBackend() {
            if (!appInstance) {
                appInstance = await Client.connect("eshan6704/backend");
            }
            return appInstance;
        }

        // Fetch from backend
        async function fetchFromBackend(type, name, req_type) {
            try {
                const app = await connectBackend();
                const result = await app.predict("/fetch_data", [type, name, req_type]);
                return result.data || ["<p>No data returned from backend.</p>"];
            } catch (err) {
                console.error("Backend error:", err);
                return [`<p style="color:red;">Backend error: ${err.message}</p>`];
            }
        }

        // Fetch button
        window.fetchNow = async function() {
            const type = window.currentMode || "stock";
            const name = document.getElementById("symbolInput").value;
            const req_type = document.getElementById("reqType").value;

            const responseBlocks = await fetchFromBackend(type, name, req_type);

            const backendArea = document.getElementById("backendDiv");
            backendArea.innerHTML = ""; // clear old
            responseBlocks.forEach(block => {
                backendArea.innerHTML += block;
                backendArea.innerHTML += "<hr>";
            });

            // Show backend by default after fetch
            if(currentView === 'backend') backendArea.style.display = "block";
        };

        // Toggle data view tabs
        function setDataView(view) {
            currentView = view;
            const backendDiv = document.getElementById("backendDiv");
            const frontendDiv = document.getElementById("frontendDiv");

            if(view === 'backend'){
                backendDiv.style.display = "block";
                frontendDiv.style.display = "none";
                document.getElementById("btnBackend").classList.add("active");
                document.getElementById("btnFrontend").classList.remove("active");
            } else {
                backendDiv.style.display = "none";
                frontendDiv.style.display = "block";
                document.getElementById("btnBackend").classList.remove("active");
                document.getElementById("btnFrontend").classList.add("active");
            }
        }

        // Stock / Index tabs
        function setMode(mode){
            window.currentMode = mode;

            // Tab highlight
            if(mode === 'stock'){
                document.getElementById("btnStock").classList.add("active");
                document.getElementById("btnIndex").classList.remove("active");
                document.getElementById("symbolInput").value = "ITC";
                document.getElementById("reqType").innerHTML = `
                    <option>stock_info</option>
                    <option>intraday</option>
                    <option>daily</option>
                    <option>qresult</option>
                    <option>result</option>
                    <option>balance</option>
                    <option>cashflow</option>
                    <option>dividend</option>
                    <option>split</option>
                `;
            } else {
                document.getElementById("btnStock").classList.remove("active");
                document.getElementById("btnIndex").classList.add("active");
                document.getElementById("symbolInput").value = "NIFTY 50";
                document.getElementById("reqType").innerHTML = `
                    <option>indices</option>
                    <option>open</option>
                    <option>preopen</option>
                    <option>ce</option>
                    <option>pe</option>
                    <option>future</option>
                    <option>bhav</option>
                    <option>highlow</option>
                `;
            }
        }

        // Initialize default view
        setDataView('backend');
        setMode('stock');
    </script>

</body>
</html>
