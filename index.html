<!DOCTYPE html>
<html>
<head>
    <title>Stock / Index App</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            background: #222;
            padding: 6px 10px;
            color: white;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-bar button, .top-bar select, .top-bar input {
            height: 28px;
            padding: 2px 6px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .top-bar button.active { background: #00aaff; color: white; }
        .top-bar button:not(.active) { background: #555; color: white; }
        .top-bar button:hover { background: #0099dd; }

        .top-bar select, .top-bar input {
            font-weight: normal;
            border: 1px solid #aaa;
            outline: none;
        }

        .top-bar select:focus, .top-bar input:focus {
            border-color: #00aaff;
        }

        /* Backend / Frontend Divs */
        #backendDiv, #frontendDiv {
            padding: 15px;
            border-top: 2px solid #ccc;
            border-radius: 6px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
            max-height: 400px;
            overflow-y: auto;
            margin: 10px;
        }

        #backendDiv { background: #f8f8f8; }
        #frontendDiv { background: #eef7ff; }

        /* Workspace area */
        #workspaceArea {
            padding: 20px;
            min-height: 400px;
            border-top: 2px solid #ddd;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin: 10px;
        }

        /* Tables style */
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 10px;
        }

        table, th, td {
            border: 1px solid #aaa;
        }

        th, td {
            padding: 6px 8px;
            text-align: left;
        }

        th {
            background-color: #00aaff;
            color: white;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <button id="btnStock" class="active" onclick="setMode('stock')" aria-label="Switch to Stock">Stock</button>
        <button id="btnIndex" onclick="setMode('index')" aria-label="Switch to Index">Index</button>

        <input type="text" id="symbolInput" value="ITC" style="width:90px;" aria-label="Stock or Index Symbol">

        <select id="reqType" aria-label="Request Type"></select>

        <button onclick="fetchNow()" aria-label="Fetch data from backend">Fetch</button>
    </div>

    <!-- BACKEND DIV -->
    <div id="backendDiv">
        <h3>Backend Data</h3>
    </div>

    <!-- FRONTEND DIV -->
    <div id="frontendDiv">
        <h3>Frontend Extracted Tables</h3>
        <p>No tables extracted yet.</p>
    </div>

    <!-- Workspace area -->
    <div id="workspaceArea"></div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let appInstance = null;
        let currentMode = 'stock';

        const reqOptions = {
            stock: ["info","intraday","daily","qresult","result","balance","cashflow","dividend","split"],
            index: ["index","open","preopen","ce","pe","future","bhav","highlow"]
        };

        async function connectBackend() {
            if (!appInstance) {
                appInstance = await Client.connect("eshan6704/backend");
            }
            return appInstance;
        }

        async function fetchFromBackend(mode, req_type, name) {
            try {
                const app = await connectBackend();
                const result = await app.predict("/fetch_data", [mode, req_type, name]);
                if (Array.isArray(result.data)) return result.data;
                if (typeof result.data === "string") return [result.data];
                return ["<p>No data returned from backend.</p>"];
            } catch (err) {
                console.error("Backend error:", err);
                return [`<p style="color:red;">Backend error: ${err.message}</p>`];
            }
        }

        window.fetchNow = async function() {
            const mode = currentMode;
            const req_type = document.getElementById("reqType").value;
            const name = document.getElementById("symbolInput").value;

            const responseBlocks = await fetchFromBackend(mode, req_type, name);

            const backendArea = document.getElementById("backendDiv");
            const frontendArea = document.getElementById("frontendDiv");

            // Clear old content
            backendArea.innerHTML = "<h3>Backend Data</h3>";
            frontendArea.innerHTML = "<h3>Frontend Extracted Tables</h3>";

            const fragmentBackend = document.createDocumentFragment();
            const fragmentFrontend = document.createDocumentFragment();

            responseBlocks.forEach(block => {
                // --- Append to backend ---
                const divBackend = document.createElement("div");
                divBackend.innerHTML = block;
                fragmentBackend.appendChild(divBackend);
                fragmentBackend.appendChild(document.createElement("hr"));

                // --- Extract tables for frontend ---
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = block;
                const tables = tempDiv.querySelectorAll("table");
                tables.forEach(tbl => {
                    const tblClone = tbl.cloneNode(true);
                    fragmentFrontend.appendChild(tblClone);
                    fragmentFrontend.appendChild(document.createElement("hr"));
                });
            });

            backendArea.appendChild(fragmentBackend);
            frontendArea.appendChild(fragmentFrontend);

            if(fragmentFrontend.children.length === 0){
                frontendArea.innerHTML += "<p>No tables found in backend response.</p>";
            }
        };

        function setMode(mode){
            currentMode = mode;
            const symbolInput = document.getElementById("symbolInput");
            const reqType = document.getElementById("reqType");

            symbolInput.value = (mode === 'stock') ? "ITC" : "NIFTY 50";
            reqType.innerHTML = reqOptions[mode].map(opt => `<option>${opt}</option>`).join("");

            document.getElementById("btnStock").classList.toggle("active", mode === 'stock');
            document.getElementById("btnIndex").classList.toggle("active", mode === 'index');
        }

        // Keyboard-friendly: press Enter to fetch
        document.getElementById("symbolInput").addEventListener("keypress", e => {
            if(e.key === "Enter") fetchNow();
        });

        // Initialize default view
        setMode('stock');

    </script>

</body>
</html>
